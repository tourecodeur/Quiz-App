<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Challenge</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>🎯 Quiz Challenge</h1>

        <div class="score-box">
          Score enregistré : <strong id="savedScore">0</strong>
        </div>

        <div id="poleSelection">
          <h2>Choisir un pôle</h2>
          <button onclick="startQuiz('dev')">Dev</button>
          <button onclick="startQuiz('design')">Design</button>
          <button onclick="startQuiz('marketing')">Marketing</button>
        </div>

        <div id="quizContainer" class="hidden">
          <div id="progressBar"></div>
          <h2 id="question"></h2>
          <div id="answers"></div>
        </div>

        <div id="resultContainer" class="hidden">
          <h2>Résultat</h2>
          <h1 id="finalScore"></h1>
          <p id="message"></p>
          <button onclick="restartQuiz()">Rejouer</button>
        </div>

        <button onclick="resetScore()">Reset score</button>
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
